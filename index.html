<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coin Flip</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Coin Flip</h1>
    <button id="speak-btn" class="icon-btn" aria-label="Speak last result" title="Read last result aloud">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
    </button>
  </header>

  <main>
    <div class="coin-wrapper">
      <div class="coin" id="coin">
        <div class="coin-face coin-heads">
          <span class="coin-symbol">H</span>
        </div>
        <div class="coin-face coin-tails">
          <span class="coin-symbol">T</span>
        </div>
      </div>
    </div>

    <button class="flip-btn" id="flip-btn">FLIP!</button>

    <div class="stats">
      <p class="last-five">
        <span class="stat-label">Last 5:</span>
        <span id="last-five-results" class="result-pills">—</span>
      </p>
      <p class="percentage">
        <span class="stat-label">Heads %:</span>
        <span id="heads-pct">—</span>
      </p>
      <p class="percentage">
        <span class="stat-label">Tails %:</span>
        <span id="tails-pct">—</span>
      </p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
